[build]
  publish = "."
  functions = "netlify/functions"

[images]
  remote_images = [
    "https://prod-files-secure\\.s3\\.us-west-2\\.amazonaws\\.com/.*",
    "https://s3\\.us-west-2\\.amazonaws\\.com/.*",
    "https://file\\.notion\\.so/.*",
    "https://notion\\.so/.*"
  ]

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.notion.com; frame-ancestors 'none';"
